apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-service
  namespace: testing-keda
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-service
  template:
    metadata:
      labels:
        app: api-service
    spec:
      containers:
        - name: api-service
          image: api-service:latest
          imagePullPolicy: Never
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: OTLP_TRACE_BACKEND_URL
              value: http://otel-lgtm:4317
            - name: OTLP_LOGGING_BACKEND_URL
              value: http://otel-lgtm:4317
            - name: OTLP_METRICS_BACKEND_URL
              value: http://otel-lgtm:4317
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 10
---
apiVersion: v1
kind: Service
metadata:
  name: api-service
  namespace: testing-keda
spec:
  selector:
    app: api-service
  ports:
    - name: http
      port: 8080
      targetPort: 8080
