services:

  otel-lgtm:
    image: grafana/otel-lgtm
    ports:
      - "3000:3000"   # Grafana UI  (admin / admin)
      - "4317:4317"   # OTLP gRPC endpoint
      - "4318:4318"   # OTLP HTTP endpoint
    healthcheck:
      test: ["CMD-SHELL", "curl --fail http://localhost:3000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  api-service:
    build:
      context: api-service-emulator
      dockerfile: Dockerfile.api-service
    ports:
      - "8080:8080"
    environment:
      OTLP_TRACE_BACKEND_URL:   http://otel-lgtm:4317
      OTLP_LOGGING_BACKEND_URL: http://otel-lgtm:4317
      OTLP_METRICS_BACKEND_URL: http://otel-lgtm:4317
    healthcheck:
      test: ["CMD-SHELL", "curl --fail http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    depends_on:
      otel-lgtm:
        condition: service_healthy


  k6:
    image: grafana/k6
    ports:
      - "6565:6565"
    volumes:
      - "./k6_tests:/k6_tests"
    environment:
      - K6_OTEL_EXPORTER_TYPE=http
      - K6_OTEL_HTTP_EXPORTER_ENDPOINT=http://otel-lgtm:4318
    command: run /k6_tests/test_api_service_health.js
    depends_on:
      otel-lgtm:
        condition: service_healthy
      api-service:
        condition: service_healthy